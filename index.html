<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام إدارة الموظفين</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"><\/script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --sidebar:#03455E;
  --dash-bg:#607496;
  --card:#ffffff;
  --sidebar-hover:rgba(255,255,255,0.1);
  --sidebar-active:rgba(255,255,255,0.18);
  --txt:#1c1c1a;--txt2:#5a5a56;--txt3:#9a9a96;
  --brd:rgba(0,0,0,0.09);--brd2:rgba(0,0,0,0.18);
  --blue:#1a6bc4;--blue-l:#deeaf8;
  --green:#2d7d3a;--green-l:#e0f0e3;
  --amber:#b06a00;--amber-l:#fdf0dc;
  --red:#c0392b;--red-l:#fce8e6;
  --purple:#5b4fcf;--purple-l:#eceafb;
  --teal:#0f7a6e;--teal-l:#daf2ef;
  --r:10px;--r2:14px;--r3:18px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:var(--dash-bg);color:var(--txt);font-size:14px;min-height:100vh}
.app-wrap{display:flex;height:100vh;overflow:hidden}
/* SIDEBAR */
.sidebar{width:235px;background:var(--sidebar);display:flex;flex-direction:column;flex-shrink:0}
.logo-area{padding:22px 18px 18px;border-bottom:1px solid rgba(255,255,255,0.12)}
.logo-row{display:flex;align-items:center;gap:11px}
.logo-ic{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,0.18);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-ic i{font-size:19px;color:#fff}
.logo-nm{font-size:14px;font-weight:700;color:#fff}
.logo-sb{font-size:11px;color:rgba(255,255,255,0.55);margin-top:2px}
.nav-menu{padding:10px 8px;flex:1;overflow-y:auto}
.nav-sep{font-size:10px;font-weight:700;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:.08em;padding:10px 12px 4px;margin-top:4px}
.ni{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--r);cursor:pointer;font-size:13px;color:rgba(255,255,255,0.7);margin-bottom:2px;transition:all .15s;user-select:none}
.ni:hover{background:var(--sidebar-hover);color:#fff}
.ni.active{background:var(--sidebar-active);color:#fff;font-weight:600}
.ni i{font-size:17px;flex-shrink:0;color:rgba(255,255,255,0.55)}
.ni.active i,.ni:hover i{color:#fff}
.user-footer{padding:13px 15px;border-top:1px solid rgba(255,255,255,0.12);display:flex;align-items:center;gap:9px}
.user-footer .nm{font-size:12px;font-weight:700;color:#fff}
.user-footer .rl{font-size:10px;color:rgba(255,255,255,0.5)}
/* MAIN */
.main-area{flex:1;overflow-y:auto;padding:24px 26px;background:var(--dash-bg)}
.screen{display:none}.screen.active{display:block}
.pg{display:none}.pg.active{display:block}
.pg-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.pg-title{font-size:20px;font-weight:800;color:#fff}
.pg-sub{font-size:12px;color:rgba(255,255,255,0.65);margin-top:3px}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;border-radius:var(--r);border:1px solid var(--brd2);background:var(--card);font-size:13px;cursor:pointer;color:var(--txt);font-family:inherit;font-weight:500;transition:all .15s}
.btn:hover{background:#f5f5f3}
.btn-blue{background:var(--blue);color:#fff;border-color:var(--blue)}.btn-blue:hover{background:#1055a0;color:#fff}
.btn-white{background:rgba(255,255,255,0.15);color:#fff;border-color:rgba(255,255,255,0.25)}.btn-white:hover{background:rgba(255,255,255,0.25)}
.btn-red{background:var(--red-l);color:var(--red);border-color:#e0b0ac}.btn-red:hover{background:#f9d5d2}
.btn-green{background:var(--green-l);color:var(--green);border-color:#aed4b5}.btn-green:hover{background:#d0ebd4}
.btn-sm{padding:5px 10px;font-size:12px}
/* CARDS */
.card{background:var(--card);border-radius:var(--r2);padding:20px;box-shadow:0 2px 12px rgba(0,0,0,0.1)}
.card-flat{background:var(--card);border-radius:var(--r2);overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.1)}
/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.kpi-card{background:var(--card);border-radius:var(--r2);padding:18px 20px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 12px rgba(0,0,0,0.1);transition:transform .2s,box-shadow .2s;border-right:4px solid transparent}
.kpi-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.15)}
.kpi-ic{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.kpi-ic i{font-size:23px}
.kpi-val{font-size:30px;font-weight:900;line-height:1;color:var(--txt)}
.kpi-lbl{font-size:12px;color:var(--txt2);margin-top:3px;font-weight:500}
.kpi-trend{font-size:11px;margin-top:5px;font-weight:600}
/* DASH SECTIONS */
.dash-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;margin-bottom:16px}
.dsc{background:var(--card);border-radius:var(--r2);overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.1)}
.dsc-head{padding:14px 18px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between}
.dsc-title{font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px;color:var(--txt)}
.dsc-title i{font-size:16px;color:var(--txt2)}
.dr{display:flex;align-items:center;gap:10px;padding:11px 18px;border-bottom:1px solid var(--brd);font-size:13px;transition:background .12s}
.dr:last-child{border-bottom:none}
.dr:hover{background:#fafaf8}
.dr-main{flex:1;min-width:0}
.dr-t{font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dr-s{font-size:11px;color:var(--txt2);margin-top:2px}
/* CHARTS ROW */
.charts-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:16px}
.chart-card{background:var(--card);border-radius:var(--r2);padding:18px;box-shadow:0 2px 12px rgba(0,0,0,0.1)}
.chart-title{font-size:13px;font-weight:700;color:var(--txt);margin-bottom:14px;display:flex;align-items:center;gap:7px}
.chart-title i{font-size:15px;color:var(--txt2)}
.chart-wrap{position:relative;height:160px;display:flex;align-items:center;justify-content:center}
/* BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.b-blue{background:var(--blue-l);color:var(--blue)}
.b-green{background:var(--green-l);color:var(--green)}
.b-amber{background:var(--amber-l);color:var(--amber)}
.b-red{background:var(--red-l);color:var(--red)}
.b-purple{background:var(--purple-l);color:var(--purple)}
.b-teal{background:var(--teal-l);color:var(--teal)}
.b-gray{background:#f1efe8;color:var(--txt2)}
/* AVATARS */
.av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.av0{background:#c5ddf7;color:#0f4a8a}.av1{background:#b0e6de;color:#0f7a6e}
.av2{background:#d4d0f8;color:#5b4fcf}.av3{background:#fad9a0;color:#b06a00}
.av4{background:#b8e0bf;color:#2d7d3a}.av5{background:#f5c0ba;color:#c0392b}
/* TABLE */
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:right;padding:12px 16px;border-bottom:1px solid var(--brd);font-weight:700;font-size:11px;color:var(--txt2);background:#f8f8f6;text-transform:uppercase;letter-spacing:.04em}
td{padding:10px 16px;border-bottom:1px solid var(--brd);color:var(--txt);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf8}
/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
/* PROGRESS */
.pb{background:#e5e4e0;border-radius:4px;height:7px;overflow:hidden}
.pf{height:100%;border-radius:4px;transition:width .4s}
/* MODALS */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:999;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.overlay.open{display:flex}
.modal{background:var(--card);border-radius:var(--r3);padding:28px;width:510px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,0.2)}
.modal-title{font-size:17px;font-weight:800;margin-bottom:20px;display:flex;align-items:center;gap:10px;color:var(--txt)}
.modal-title .mi{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.modal-title .mi i{font-size:19px;color:#fff}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--brd)}
.fr{margin-bottom:14px}
.fr label{display:block;font-size:12px;color:var(--txt2);margin-bottom:5px;font-weight:600}
.fr input,.fr select,.fr textarea{width:100%;padding:10px 12px;border:1.5px solid var(--brd2);border-radius:var(--r);font-size:13px;background:#fff;color:var(--txt);font-family:inherit;transition:border-color .15s}
.fr input:focus,.fr select:focus,.fr textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,107,196,.1)}
.fr textarea{resize:vertical;min-height:72px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.login-inner{background:var(--blue-l);border-radius:var(--r);padding:14px 16px;border:1.5px solid rgba(26,107,196,.2)}
/* STARS */
.stars{display:flex;gap:3px;margin-top:3px}
.stars span{font-size:26px;cursor:pointer;color:#ddd;transition:color .1s;line-height:1}
.stars span.on{color:#f5a623}
/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(145deg,#03455E 0%,#607496 60%,#03455E 100%)}
.login-panel{width:420px}
.login-head{text-align:center;margin-bottom:28px}
.login-brand{width:68px;height:68px;border-radius:18px;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;border:2px solid rgba(255,255,255,0.25);backdrop-filter:blur(10px)}
.login-brand i{font-size:32px;color:#fff}
.login-head h1{font-size:23px;font-weight:900;color:#fff}
.login-head p{font-size:13px;color:rgba(255,255,255,0.65);margin-top:5px}
.login-card{background:rgba(255,255,255,0.97);border-radius:var(--r3);padding:28px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.hint-box{background:var(--blue-l);border-radius:var(--r);padding:13px 16px;margin-top:14px;font-size:12px;color:var(--blue);border:1px solid rgba(26,107,196,.2)}
.hint-box b{display:block;font-size:13px;margin-bottom:5px}
.err-box{background:var(--red-l);color:var(--red);padding:9px 13px;border-radius:var(--r);font-size:13px;margin-bottom:12px;display:none;border:1px solid #e8b0ac}
/* EMP PORTAL KPI */
.ekpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.ekpi{border-radius:var(--r2);padding:16px 18px;display:flex;align-items:center;gap:12px;background:rgba(255,255,255,0.18);backdrop-filter:blur(8px)}
.ekpi-val{font-size:24px;font-weight:900;line-height:1;color:#fff}
.ekpi-lbl{font-size:11px;font-weight:600;margin-top:3px;color:rgba(255,255,255,0.75)}
.ekpi i{font-size:24px;color:rgba(255,255,255,0.8)}
/* PROJ CARD */
.proj-card{background:var(--card);border-radius:var(--r2);padding:18px;box-shadow:0 2px 12px rgba(0,0,0,0.08);transition:transform .2s,box-shadow .2s}
.proj-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.13)}
/* EMPTY */
.empty-st{text-align:center;padding:36px 20px;color:var(--txt3)}
.empty-st i{font-size:34px;display:block;margin-bottom:9px;opacity:.35}
.empty-st p{font-size:13px}
/* EDIT BTN */
.action-btns{display:flex;gap:5px}
/* SECTION TITLES in non-dash pages */
.section-bg{background:rgba(255,255,255,0.08);border-radius:var(--r2);padding:20px;margin-bottom:16px}
</style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div id="scr-login" class="screen active">
<div class="login-wrap"><div class="login-panel">
  <div class="login-head">
    <div class="login-brand"><i class="ti ti-building-community"></i></div>
    <h1>نظام إدارة الموظفين</h1>
    <p>بوابة الدخول الموحدة للمدير والموظفين</p>
  </div>
  <div class="login-card">
    <div class="fr"><label>اسم المستخدم</label><input id="l-u" placeholder="admin" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div class="fr"><label>كلمة السر</label><input type="password" id="l-p" placeholder="••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div class="err-box" id="l-err">اسم المستخدم أو كلمة السر غير صحيحة</div>
    <button class="btn btn-blue" style="width:100%;justify-content:center;padding:11px;font-size:14px" onclick="doLogin()"><i class="ti ti-login"></i> تسجيل الدخول</button>
    <div class="hint-box"><b><i class="ti ti-info-circle" style="font-size:14px;vertical-align:-2px"></i> حسابات تجريبية</b>المدير: <b>admin</b> / <b>admin123</b><div style="margin-top:4px;color:var(--txt2)">الموظف: يُضاف عند إنشاء موظف جديد</div></div>
  </div>
</div></div>
</div>

<!-- ══ ADMIN ══ -->
<div id="scr-admin" class="screen">
<div class="app-wrap">
  <div class="sidebar">
    <div class="logo-area">
      <div class="logo-row">
        <div class="logo-ic"><i class="ti ti-building-community"></i></div>
        <div><div class="logo-nm">نظام الموظفين</div><div class="logo-sb">لوحة المدير</div></div>
      </div>
    </div>
    <div class="nav-menu">
      <div class="nav-sep">الرئيسية</div>
      <div class="ni active" onclick="aPage('dashboard')"><i class="ti ti-layout-dashboard"></i><span>لوحة التحكم</span></div>
      <div class="nav-sep">إدارة الموارد</div>
      <div class="ni" onclick="aPage('employees')"><i class="ti ti-users"></i><span>الموظفون</span></div>
      <div class="ni" onclick="aPage('tasks')"><i class="ti ti-checklist"></i><span>المهام</span></div>
      <div class="ni" onclick="aPage('projects')"><i class="ti ti-folders"></i><span>المشاريع</span></div>
      <div class="nav-sep">التطوير والأداء</div>
      <div class="ni" onclick="aPage('initiatives')"><i class="ti ti-bulb"></i><span>المبادرات</span></div>
      <div class="ni" onclick="aPage('goals')"><i class="ti ti-target"></i><span>الأهداف</span></div>
      <div class="nav-sep">التخطيط</div>
      <div class="ni" onclick="aPage('vacations')"><i class="ti ti-beach"></i><span>الإجازات</span></div>
      <div class="ni" onclick="aPage('daily')"><i class="ti ti-calendar-event"></i><span>الأعمال اليومية</span></div>
    </div>
    <div class="user-footer">
      <div class="av av0" style="width:34px;height:34px;font-size:13px">م</div>
      <div style="flex:1;min-width:0"><div class="nm">المدير العام</div><div class="rl">صلاحية كاملة</div></div>
      <button class="btn btn-sm" style="background:rgba(255,255,255,0.12);color:#fff;border-color:rgba(255,255,255,0.2)" onclick="logout()"><i class="ti ti-logout" style="font-size:14px"></i></button>
    </div>
  </div>
  <div class="main-area">

    <!-- DASHBOARD -->
    <div class="pg active" id="ap-dashboard">
      <div class="pg-head">
        <div><div class="pg-title">لوحة التحكم</div><div class="pg-sub" id="dash-dt"></div></div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-white btn-sm" onclick="aPage('employees');openM('m-emp')"><i class="ti ti-user-plus"></i> موظف جديد</button>
          <button class="btn btn-white btn-sm" onclick="aPage('tasks');openM('m-task')"><i class="ti ti-plus"></i> مهمة جديدة</button>
        </div>
      </div>
      <div class="kpi-grid">
        <div class="kpi-card" style="border-right-color:var(--blue)"><div class="kpi-ic" style="background:var(--blue-l)"><i class="ti ti-users" style="color:var(--blue)"></i></div><div><div class="kpi-val" id="k-emp">0</div><div class="kpi-lbl">إجمالي الموظفين</div><div class="kpi-trend" style="color:var(--blue)" id="k-emp-t"></div></div></div>
        <div class="kpi-card" style="border-right-color:var(--purple)"><div class="kpi-ic" style="background:var(--purple-l)"><i class="ti ti-folders" style="color:var(--purple)"></i></div><div><div class="kpi-val" id="k-proj">0</div><div class="kpi-lbl">مشاريع نشطة</div><div class="kpi-trend" style="color:var(--purple)" id="k-proj-t"></div></div></div>
        <div class="kpi-card" style="border-right-color:var(--amber)"><div class="kpi-ic" style="background:var(--amber-l)"><i class="ti ti-checklist" style="color:var(--amber)"></i></div><div><div class="kpi-val" id="k-task">0</div><div class="kpi-lbl">مهام قيد التنفيذ</div><div class="kpi-trend" style="color:var(--amber)" id="k-task-t"></div></div></div>
        <div class="kpi-card" style="border-right-color:var(--teal)"><div class="kpi-ic" style="background:var(--teal-l)"><i class="ti ti-bulb" style="color:var(--teal)"></i></div><div><div class="kpi-val" id="k-init">0</div><div class="kpi-lbl">مبادرات الموظفين</div><div class="kpi-trend" style="color:var(--teal)" id="k-init-t"></div></div></div>
      </div>
      <!-- CHARTS ROW -->
      <div class="charts-row">
        <div class="chart-card"><div class="chart-title"><i class="ti ti-chart-donut"></i>توزيع حالات المهام</div><div class="chart-wrap"><canvas id="ch-tasks"></canvas></div></div>
        <div class="chart-card"><div class="chart-title"><i class="ti ti-chart-bar"></i>إنجاز المشاريع</div><div class="chart-wrap"><canvas id="ch-proj"></canvas></div></div>
        <div class="chart-card"><div class="chart-title"><i class="ti ti-chart-donut"></i>توزيع الأقسام</div><div class="chart-wrap"><canvas id="ch-dept"></canvas></div></div>
      </div>
      <!-- DASH GRID -->
      <div class="dash-grid">
        <div>
          <div class="dsc" style="margin-bottom:14px">
            <div class="dsc-head"><div class="dsc-title"><i class="ti ti-folders"></i>المشاريع النشطة</div><button class="btn btn-sm" onclick="aPage('projects')">عرض الكل</button></div>
            <div id="d-proj"><div class="empty-st"><i class="ti ti-folders"></i><p>لا توجد مشاريع</p></div></div>
          </div>
          <div class="dsc">
            <div class="dsc-head"><div class="dsc-title"><i class="ti ti-target"></i>مؤشر الأهداف</div><button class="btn btn-sm" onclick="aPage('goals')">عرض الكل</button></div>
            <div id="d-goals" style="padding:12px 16px"><div class="empty-st"><i class="ti ti-target"></i><p>لا توجد أهداف</p></div></div>
          </div>
        </div>
        <div>
          <div class="dsc" style="margin-bottom:14px">
            <div class="dsc-head"><div class="dsc-title"><i class="ti ti-bulb"></i>أبرز المبادرات</div><button class="btn btn-sm" onclick="aPage('initiatives')">عرض الكل</button></div>
            <div id="d-init"><div class="empty-st"><i class="ti ti-bulb"></i><p>لا توجد مبادرات</p></div></div>
          </div>
          <div class="dsc">
            <div class="dsc-head"><div class="dsc-title"><i class="ti ti-beach"></i>الإجازات القادمة</div><button class="btn btn-sm" onclick="aPage('vacations')">عرض الكل</button></div>
            <div id="d-vac"><div class="empty-st"><i class="ti ti-beach"></i><p>لا توجد إجازات</p></div></div>
          </div>
        </div>
      </div>

<script>
// ══ STORAGE ══
const SK='emp_sys_v3';
const AVC=['av0','av1','av2','av3','av4','av5'];
let DB={employees:[],tasks:[],projects:[],initiatives:[],goals:[],vacations:[],daily:[]};
let CU=null,CS=0;
let charts={};

function save(){try{localStorage.setItem(SK,JSON.stringify(DB));}catch(e){}}
function load(){try{const d=localStorage.getItem(SK);if(d)DB=Object.assign({employees:[],tasks:[],projects:[],initiatives:[],goals:[],vacations:[],daily:[]},JSON.parse(d));}catch(e){}}

const $=id=>document.getElementById(id);
const v=id=>($( id)||{}).value||'';
const sv=(id,val)=>{const e=$(id);if(e)e.value=val;};
const clr=ids=>ids.forEach(id=>{const e=$(id);if(e)e.value='';});
const avc=i=>AVC[((i%6)+6)%6];
const ini=(f,l)=>(f[0]||'').toUpperCase()+(l[0]||'').toUpperCase();
const tod=()=>new Date().toISOString().split('T')[0];
const ddays=(a,b)=>Math.max(1,Math.round((new Date(b)-new Date(a))/86400000)+1);
const strs=n=>'★'.repeat(n)+'☆'.repeat(5-n);
const nid=()=>Date.now()+Math.floor(Math.random()*1000);

function pC(p){return p==='عالية'?'b-red':p==='متوسطة'?'b-amber':'b-green';}
function sC(s){if(['مكتمل','موافق عليها','نشط'].includes(s))return 'b-green';if(['قيد التنفيذ','جاري','مخطط'].includes(s))return 'b-blue';if(['متوقف','مرفوضة','موقوف'].includes(s))return 'b-red';return 'b-gray';}
function dC(s){return s==='مكتمل'?'#2d7d3a':s==='جاري'?'#1a6bc4':'#b06a00';}

// ══ SCREENS ══
function showScr(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));$(id).classList.add('active');}
function doLogin(){
  const u=v('l-u').trim(),p=v('l-p').trim();
  $('l-err').style.display='none';
  if(u==='admin'&&p==='admin123'){CU={role:'admin'};showScr('scr-admin');aPage('dashboard');initDates();return;}
  const emp=DB.employees.find(e=>e.username===u&&e.password===p);
  if(emp){CU={role:'employee',id:emp.id};showScr('scr-emp');buildEmpPortal(emp);ePage('home');return;}
  $('l-err').style.display='block';
}
function logout(){CU=null;clr(['l-u','l-p']);$('l-err').style.display='none';showScr('scr-login');}

// ══ ADMIN NAV ══
function aPage(pg){
  document.querySelectorAll('#scr-admin .ni').forEach(n=>n.classList.toggle('active',!!n.getAttribute('onclick')&&n.getAttribute('onclick').includes("'"+pg+"'")));
  ['dashboard','employees','tasks','projects','initiatives','goals','vacations','daily'].forEach(p=>$('ap-'+p).classList.toggle('active',p===pg));
  if(pg==='dashboard')renderDash();
  refreshSel();
}
function ePage(pg){
  document.querySelectorAll('#scr-emp .ni').forEach(n=>n.classList.toggle('active',!!n.getAttribute('onclick')&&n.getAttribute('onclick').includes("'"+pg+"'")));
  ['home','mytasks','mygoals','myinit','myvac','mydaily'].forEach(p=>$('ep-'+p).classList.toggle('active',p===pg));
  if(CU&&CU.role==='employee'){const emp=DB.employees.find(e=>e.id===CU.id);if(emp)renderEmpData(emp);}
}

// ══ EMP PORTAL ══
function buildEmpPortal(emp){
  const idx=DB.employees.findIndex(e=>e.id===emp.id),a=avc(idx),i=ini(emp.fname,emp.lname);
  $('ep-sub').textContent=emp.title;

function saveEmp(){
  const fn=v('ef-fn'),ln=v('ef-ln'),tt=v('ef-tt'),dp=v('ef-dp'),ph=v('ef-ph'),em=v('ef-em'),jn=v('ef-jn'),st=v('ef-st'),us=v('ef-us'),pw=v('ef-pw'),eid=v('ef-id');
  if(!fn||!ln||!tt){alert('يرجى ملء الاسم والمسمى');return;}
  if(!us||!pw){alert('يرجى إدخال بيانات الدخول');return;}
  if(eid){
    const idx=DB.employees.findIndex(x=>x.id==eid);
    if(idx>-1){const dup=DB.employees.find(e=>e.username===us&&e.id!=eid);if(dup){alert('اسم المستخدم مستخدم مسبقاً');return;}DB.employees[idx]={...DB.employees[idx],fname:fn,lname:ln,title:tt,dept:dp,phone:ph,email:em,join:jn,status:st,username:us,password:pw};}
  }else{
    if(DB.employees.find(e=>e.username===us)){alert('اسم المستخدم مستخدم مسبقاً');return;}
    DB.employees.push({id:nid(),fname:fn,lname:ln,title:tt,dept:dp,phone:ph,email:em,join:jn,status:st,username:us,password:pw});
  }
  save();rEmps();kpis();closeM('m-emp');clr(['ef-fn','ef-ln','ef-tt','ef-ph','ef-em','ef-us','ef-pw','ef-id']);resetModal('emp','إضافة موظف جديد','إضافة الموظف');
}

    <div style="font-size:11px;color:var(--amber);font-weight:700;margin-top:4px">${Math.round((i.stars/5)*100)}%</div>
    <div style="display:flex;gap:6px;margin-top:12px;justify-content:flex-end"><button class="btn btn-sm btn-green" onclick="editInit(${i.id})"><i class="ti ti-edit" style="font-size:13px"></i> تعديل</button><button class="btn btn-sm btn-red" onclick="delItem('initiatives',${i.id},rInits)"><i class="ti ti-trash" style="font-size:13px"></i></button></div>
  </div>`).join('');
}

function rGoals(){
  const g=$('g-goals');
  if(!DB.goals.length){g.innerHTML='<div class="empty-st"><i class="ti ti-target"></i><p>لا توجد أهداف</p></div>';return;}
  g.innerHTML='<div style="display:flex;flex-direction:column;gap:10px">'+DB.goals.map(gl=>`<div class="card" style="display:flex;align-items:center;gap:14px">
    <div style="flex:1">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:5px"><b style="font-size:14px">${gl.title}</b><span class="badge b-blue">${gl.cat}</span></div>
      <div style="font-size:12px;color:var(--txt2);margin-bottom:7px">${gl.ename||'—'}${gl.due?' · '+gl.due:''}</div>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="pb" style="flex:1"><div class="pf" style="width:${gl.prog}%;background:${gl.prog===100?'var(--green)':'var(--blue)'}"></div></div>
        <b style="font-size:13px;min-width:38px">${gl.prog}%</b>
      </div>
    </div>
    <div class="action-btns"><button class="btn btn-sm btn-green" onclick="editGoal(${gl.id})"><i class="ti ti-edit" style="font-size:13px"></i></button><button class="btn btn-sm btn-red" onclick="delItem('goals',${gl.id},rGoals)"><i class="ti ti-trash" style="font-size:13px"></i></button></div>
  </div>`).join('')+'</div>';
}

function rVacs(){
  const tb=$('t-vac');
  if(!DB.vacations.length){tb.innerHTML='<tr><td colspan="7"><div class="empty-st"><i class="ti ti-beach"></i><p>لا توجد إجازات</p></div></td></tr>';return;}
  tb.innerHTML=DB.vacations.map(vv=>`<tr>
    <td>${vv.ename}</td><td>${vv.type}</td><td>${vv.from}</td><td>${vv.to}</td><td><b>${vv.days} يوم</b></td>
    <td><select style="font-size:12px;padding:5px 8px;border:1px solid var(--brd2);border-radius:7px;background:#fff;color:var(--txt);font-family:inherit" onchange="updVac(${vv.id},this.value)">
      <option ${vv.status==='مخطط'?'selected':''}>مخطط</option>
      <option ${vv.status==='موافق عليها'?'selected':''}>موافق عليها</option>
      <option ${vv.status==='مرفوضة'?'selected':''}>مرفوضة</option>
    </select></td>
    <td><div class="action-btns"><button class="btn btn-sm btn-green" onclick="editVac(${vv.id})"><i class="ti ti-edit" style="font-size:13px"></i></button><button class="btn btn-sm btn-red" onclick="delItem('vacations',${vv.id},rVacs)"><i class="ti ti-trash" style="font-size:13px"></i></button></div></td>
  </tr>`).join('');
}
function updVac(id,val){const vv=DB.vacations.find(x=>x.id===id);if(vv){vv.status=val;save();}}

function rDaily(){renderDailyList('g-daily',DB.daily,true);}
function renderDailyList(elId,data,showEdit){
  const g=$(elId);
  if(!data.length){g.innerHTML='<div class="empty-st"><i class="ti ti-calendar-event"></i><p>لا توجد أعمال</p></div>';return;}
  const byD={};data.forEach(d=>{(byD[d.date]||(byD[d.date]=[])).push(d);});
  g.innerHTML=Object.keys(byD).sort().reverse().map(dt=>`
    <div style="margin-bottom:14px">
      <div style="font-size:11px;font-weight:700;color:rgba(255,255,255,0.7);text-transform:uppercase;letter-spacing:.05em;margin-bottom:7px">${dt}</div>
      <div class="card-flat">${byD[dt].map(d=>`
        <div style="display:flex;align-items:center;gap:12px;padding:10px 14px;border-bottom:1px solid var(--brd)">
          <div style="width:8px;height:8px;border-radius:50%;background:${dC(d.status)};flex-shrink:0"></div>
          <div style="flex:1"><b style="font-size:13px">${d.title}</b><div style="font-size:11px;color:var(--txt2)">${d.ename||''} ${d.from&&d.to?'· '+d.from+' – '+d.to:''}</div></div>
          <span class="badge ${sC(d.status)}">${d.status}</span>
          ${showEdit?`<div class="action-btns"><button class="btn btn-sm btn-green" onclick="editDaily(${d.id})"><i class="ti ti-edit" style="font-size:12px"></i></button><button class="btn btn-sm btn-red" onclick="delItem('daily',${d.id},rDaily)"><i class="ti ti-trash" style="font-size:12px"></i></button></div>`:''}
        </div>`).join('')}</div>
    </div>`).join('');
}
function delItem(list,id,rFn){if(!confirm('حذف هذا العنصر؟'))return;DB[list]=DB[list].filter(x=>x.id!==id);save();rFn();kpis();}

// ══ KPIs ══
function kpis(){
  const ne=DB.employees.length,np=DB.projects.filter(p=>p.status==='قيد التنفيذ').length,nt=DB.tasks.filter(t=>t.status!=='مكتمل').length,ni=DB.initiatives.length;
  $('k-emp').textContent=ne;$('k-proj').textContent=np;$('k-task').textContent=nt;$('k-init').textContent=ni;
  $('k-emp-t').textContent=ne?`${DB.employees.filter(e=>e.status==='نشط').length} نشط`:'';
  $('k-proj-t').textContent=np?`${DB.projects.filter(p=>p.prog===100).length} مكتمل`:'';
  $('k-task-t').textContent=nt?`${DB.tasks.filter(t=>t.status==='مكتمل').length} مكتملة`:'';
  $('k-init-t').textContent=ni?`متوسط ${Math.round(DB.initiatives.reduce((a,i)=>a+i.stars,0)/ni*10)/10} ★`:'';
}

// ══ CHARTS ══
function buildCharts(){
  const ctx1=$('ch-tasks'),ctx2=$('ch-proj'),ctx3=$('ch-dept');
  if(!ctx1||!ctx2||!ctx3)return;
  // Tasks donut
  const tDone=DB.tasks.filter(t=>t.status==='مكتمل').length;
  const tActive=DB.tasks.filter(t=>t.status==='قيد التنفيذ').length;
  const tStop=DB.tasks.filter(t=>t.status==='متوقف').length;
  if(charts.t)charts.t.destroy();
  charts.t=new Chart(ctx1,{type:'doughnut',data:{labels:['مكتملة','نشطة','متوقفة'],datasets:[{data:[tDone,tActive,tStop],backgroundColor:['#2d7d3a','#1a6bc4','#c0392b'],borderWidth:0,hoverOffset:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:10},padding:8,boxWidth:10}}}}});
  // Projects bar
  const pNames=DB.projects.slice(-5).map(p=>p.name.length>8?p.name.substring(0,8)+'…':p.name);
  const pProgs=DB.projects.slice(-5).map(p=>p.prog);
  if(charts.p)charts.p.destroy();
  charts.p=new Chart(ctx2,{type:'bar',data:{labels:pNames.length?pNames:['لا توجد'],datasets:[{label:'الإنجاز %',data:pProgs.length?pProgs:[0],backgroundColor:'rgba(26,107,196,0.8)',borderRadius:6,borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,max:100,ticks:{font:{size:10}},grid:{color:'rgba(0,0,0,0.05)'}},x:{ticks:{font:{size:10}},grid:{display:false}}}}});
  // Dept donut
  const depts={};DB.employees.forEach(e=>{depts[e.dept]=(depts[e.dept]||0)+1;});
  const dColors=['#1a6bc4','#2d7d3a','#b06a00','#5b4fcf','#0f7a6e','#c0392b','#e67e22'];
  if(charts.d)charts.d.destroy();
  charts.d=new Chart(ctx3,{type:'doughnut',data:{labels:Object.keys(depts).length?Object.keys(depts):['لا توجد'],datasets:[{data:Object.values(depts).length?Object.values(depts):[1],backgroundColor:dColors,borderWidth:0,hoverOffset:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:10},padding:6,boxWidth:10}}}}});
}

// ══ DASHBOARD ══
function renderDash(){
  kpis();
  setTimeout(buildCharts,50);
  const dp=$('d-proj');
  dp.innerHTML=DB.projects.length?DB.projects.slice(-5).reverse().map(p=>`<div class="dr"><div class="dr-main"><div class="dr-t">${p.name}</div><div class="dr-s">${p.ename}</div></div><div style="width:72px"><div class="pb"><div class="pf" style="width:${p.prog}%;background:${p.prog===100?'var(--green)':'var(--blue)'}"></div></div><div style="font-size:10px;font-weight:700;color:var(--txt2);margin-top:2px;text-align:left">${p.prog}%</div></div><span class="badge ${sC(p.status)}" style="flex-shrink:0">${p.status}</span></div>`).join(''): '<div class="empty-st"><i class="ti ti-folders"></i><p>لا توجد مشاريع</p></div>';
  const dg=$('d-goals');
  dg.innerHTML=DB.goals.length?DB.goals.slice(-4).reverse().map(g=>`<div style="margin-bottom:11px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><span style="font-weight:600">${g.title}</span><b style="color:${g.prog===100?'var(--green)':'var(--blue)'}">${g.prog}%</b></div><div class="pb"><div class="pf" style="width:${g.prog}%;background:${g.prog===100?'var(--green)':'var(--blue)'}"></div></div><div style="font-size:11px;color:var(--txt2);margin-top:2px">${g.ename||'—'}</div></div>`).join(''): '<div class="empty-st"><i class="ti ti-target"></i><p>لا توجد أهداف</p></div>';
  const di=$('d-init');
  di.innerHTML=DB.initiatives.length?DB.initiatives.slice(-4).reverse().map(i=>`<div class="dr"><div class="dr-main"><div class="dr-t">${i.title}</div><div class="dr-s">${i.ename||'—'}</div></div><span style="color:#f5a623;font-size:15px;letter-spacing:1px">${strs(i.stars)}</span></div>`).join(''): '<div class="empty-st"><i class="ti ti-bulb"></i><p>لا توجد مبادرات</p></div>';
  const dv=$('d-vac');
  const up=DB.vacations.filter(vv=>vv.from>=tod()).slice(0,4);
  dv.innerHTML=up.length?up.map(vv=>`<div class="dr"><div class="dr-main"><div class="dr-t">${vv.ename}</div><div class="dr-s">${vv.type} · ${vv.days} أيام</div></div><span style="font-size:12px;color:var(--txt2)">${vv.from}</span></div>`).join(''): '<div class="empty-st"><i class="ti ti-beach"></i><p>لا توجد إجازات قادمة</p></div>';
  const dd=$('d-daily');
  const td=DB.daily.filter(d=>d.date===tod());
  dd.innerHTML=td.length?td.map(d=>`<div style="display:flex;align-items:center;gap:12px;padding:10px 14px;border-bottom:1px solid var(--brd)"><div style="width:8px;height:8px;border-radius:50%;background:${dC(d.status)};flex-shrink:0"></div><div style="flex:1"><b style="font-size:13px">${d.title}</b><div style="font-size:11px;color:var(--txt2)">${d.ename||''} ${d.from&&d.to?'· '+d.from+' – '+d.to:''}</div></div><span class="badge ${sC(d.status)}">${d.status}</span></div>`).join(''): '<div class="empty-st"><i class="ti ti-calendar-event"></i><p>لا توجد أعمال اليوم</p></div>';
}

function initDates(){
  const t=tod();
  ['tf-du','pf-s1','pf-s2','gf-du','vf-fr','vf-to','df-dt','ef-jn'].forEach(id=>{const el=$(id);if(el&&!el.value)el.value=t;});
  $('dash-dt').textContent=new Date().toLocaleDateString('ar-SA',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
}
load();
<\/script>
</body>
</html>
